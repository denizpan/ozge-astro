<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Sacred geometry constellation grid: a repeating tile of faint gold connection lines + tiny star points.
       Intended to tile seamlessly. Very low opacity, acts as subtle cosmic background texture. -->
  <defs>
    <pattern id="stars" x="0" y="0" width="400" height="400" patternUnits="userSpaceOnUse">
      <!-- Primary connection lines: triangulated pattern, like a nav chart -->
      <g stroke="#D4A96A" stroke-width="0.35" fill="none" opacity="0.55">
        <line x1="40" y1="80" x2="160" y2="50"/>
        <line x1="160" y1="50" x2="260" y2="120"/>
        <line x1="260" y1="120" x2="350" y2="70"/>
        <line x1="40" y1="80" x2="100" y2="200"/>
        <line x1="100" y1="200" x2="200" y2="250"/>
        <line x1="200" y1="250" x2="320" y2="210"/>
        <line x1="320" y1="210" x2="260" y2="120"/>
        <line x1="100" y1="200" x2="160" y2="50"/>
        <line x1="200" y1="250" x2="340" y2="320"/>
        <line x1="340" y1="320" x2="260" y2="370"/>
        <line x1="260" y1="370" x2="120" y2="350"/>
        <line x1="120" y1="350" x2="60" y2="280"/>
        <line x1="60" y1="280" x2="100" y2="200"/>
        <line x1="60" y1="280" x2="200" y2="250"/>
      </g>
      <!-- Star points at line intersections -->
      <g fill="#D4A96A" opacity="0.75">
        <circle cx="40" cy="80" r="1.1"/>
        <circle cx="160" cy="50" r="1.4"/>
        <circle cx="260" cy="120" r="1.2"/>
        <circle cx="350" cy="70" r="0.9"/>
        <circle cx="100" cy="200" r="1.3"/>
        <circle cx="200" cy="250" r="1.6"/>
        <circle cx="320" cy="210" r="1.1"/>
        <circle cx="340" cy="320" r="1.0"/>
        <circle cx="260" cy="370" r="1.2"/>
        <circle cx="120" cy="350" r="1.1"/>
        <circle cx="60" cy="280" r="1.3"/>
      </g>
      <!-- Secondary small dust stars -->
      <g fill="#F2E8D0" opacity="0.35">
        <circle cx="220" cy="90" r="0.5"/>
        <circle cx="80" cy="140" r="0.4"/>
        <circle cx="300" cy="180" r="0.6"/>
        <circle cx="180" cy="310" r="0.5"/>
        <circle cx="30" cy="200" r="0.4"/>
        <circle cx="370" cy="280" r="0.5"/>
        <circle cx="220" cy="180" r="0.4"/>
        <circle cx="280" cy="50" r="0.5"/>
        <circle cx="140" cy="280" r="0.4"/>
        <circle cx="380" cy="140" r="0.5"/>
      </g>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#stars)"/>
</svg>
